<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corporate Translator</title>

<style>

body{
  font-family: Arial, sans-serif;
  max-width: 760px;
  margin: 40px auto;
  padding: 0 16px;
}

h1{
  margin-bottom: 8px;
}

.subtitle{
  color:#666;
  margin-bottom:20px;
}

textarea{
  width:100%;
  min-height:140px;
  padding:12px;
  font-size:14px;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button{
  margin-top:12px;
  padding:10px 16px;
  border-radius:8px;
  border:1px solid #ccc;
  background:#f5f5f5;
  cursor:pointer;
}

button:hover{
  background:#ececec;
}

#loading{
  margin-top:16px;
  display:none;
  color:#666;
}

#error{
  margin-top:16px;
  color:#b00020;
}

#result{
  margin-top:24px;
  display:none;
}

.card{
  border:1px solid #ddd;
  border-radius:10px;
  padding:14px;
  margin-bottom:14px;
  background:#fafafa;
}

.card-title{
  font-weight:bold;
  margin-bottom:6px;
}

</style>
</head>

<body>

<h1>Corporate Translator</h1>
<p class="subtitle">Paste a message and see different workplace communication styles.</p>

<textarea id="inputText" placeholder="Paste your message..."></textarea>

<input id="secret" type="password" placeholder="Enter access key">

<button onclick="translateText()">Translate</button>

<div id="loading">Translating...</div>
<div id="error"></div>
<div id="result"></div>

<script>

async function translateText(){

  const text = document.getElementById("inputText").value.trim();
  const secret = document.getElementById("secret").value.trim();

  const loading = document.getElementById("loading");
  const error = document.getElementById("error");
  const result = document.getElementById("result");

  error.textContent="";
  result.style.display="none";

  if(!text){
    error.textContent="Please paste some text.";
    return;
  }

  if(!secret){
    error.textContent="Please enter the access key.";
    return;
  }

  try{

    loading.style.display="block";

    const response = await fetch("https://vacuumlabs.app.n8n.cloud/webhook/786b3347-c262-4c3b-b2a2-a27894eecd52",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+secret
      },
      body:JSON.stringify({text})
    });

    if(!response.ok){
      throw new Error("Request failed: "+response.status);
    }

    const data = await response.json();

    result.innerHTML = `
      <div class="card">
        <div class="card-title">Corporate</div>
        ${data.corporate}
      </div>

      <div class="card">
        <div class="card-title">Friendly</div>
        ${data.friendly}
      </div>

      <div class="card">
        <div class="card-title">Direct</div>
        ${data.direct}
      </div>

      <div class="card">
        <div class="card-title">Executive</div>
        ${data.executive}
      </div>

      <div class="card">
        <div class="card-title">Brutally Honest</div>
        ${data.brutally_honest}
      </div>
    `;

    result.style.display="block";

  }
  catch(err){
    error.textContent="Error: "+err.message;
  }
  finally{
    loading.style.display="none";
  }

}

</script>

</body>
</html>
